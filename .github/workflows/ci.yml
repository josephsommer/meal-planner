name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api-build:
    name: API build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: api/pom.xml
      - name: Build and test
        run: ./mvnw --no-transfer-progress verify
        working-directory: api

  worker-build:
    name: Worker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: worker/pom.xml
      - name: Build
        run: ./mvnw --no-transfer-progress package -DskipTests
        working-directory: worker

  web-build:
    name: Web build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Build
        run: npm run build
        working-directory: web
      - name: Test
        run: npm test -- --run
        working-directory: web
