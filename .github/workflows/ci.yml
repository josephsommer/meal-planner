name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-build:
    name: API build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: api/pom.xml
      - name: List WebMvcTest jar contents
        run: ./mvnw --no-transfer-progress dependency:copy -Dartifact=org.springframework.boot:spring-boot-starter-webmvc-test:4.0.6 -DoutputDirectory=/tmp/boot-jars && unzip -l /tmp/boot-jars/spring-boot-starter-webmvc-test-4.0.6.jar | grep -i "WebMvc\|web/servlet\|web/mvc" || true
        working-directory: api
      - name: Build and test
        run: ./mvnw --no-transfer-progress verify
        working-directory: api

  worker-build:
    name: Worker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
          cache-dependency-path: worker/pom.xml
      - name: Build
        run: ./mvnw --no-transfer-progress package -DskipTests
        working-directory: worker

  web-build:
    name: Web build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: yarn
          cache-dependency-path: web/yarn.lock
      - name: Install dependencies
        run: yarn install --immutable
        working-directory: web
      - name: Build
        run: yarn build
        working-directory: web
      - name: Test
        run: yarn test --run
        working-directory: web
