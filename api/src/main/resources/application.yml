spring:
  application:
    name: compendium-api
  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only verifies entities match at startup.
      ddl-auto: validate
    # Prevents lazy-loading being silently triggered inside serialization —
    # all data fetching must happen in the service layer.
    open-in-view: false
  flyway:
    enabled: true
  cloud:
    aws:
      region:
        # Prevents spring-cloud-aws from querying the EC2 instance metadata service
        # to discover the region. IMDS is unreachable in local dev and CI (not EC2),
        # which causes core AWS auto-configurations to fail and blocks Flyway.
        # application-aws.yml overrides this with ${AWS_DEFAULT_REGION} on EB.
        static: us-east-1
      parameterstore:
        # Disabled by default so the spring-cloud-aws auto-config does not attempt
        # an SSM connection in local dev or Testcontainers tests. Enabled via
        # application-aws.yml when SPRING_PROFILES_ACTIVE=aws.
        enabled: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# Datasource is not declared here. Spring Boot reads SPRING_DATASOURCE_URL,
# SPRING_DATASOURCE_USERNAME, and SPRING_DATASOURCE_PASSWORD from the environment
# and binds them to spring.datasource.* automatically (relaxed binding).
# In tests, @ServiceConnection overrides these with the Testcontainers MySQL URL.
