# Settings active only when SPRING_PROFILES_ACTIVE=aws (set by EB env vars).
# The primary DataSource is supplied by RdsIamDataSourceConfig (IAM token auth).
# Flyway gets its own connection here using the master user credentials so it
# retains DDL privileges that the app user (compendium_app) does not have.
# The Flyway password is loaded from SSM Parameter Store at startup via spring-cloud-aws;
# it is never stored as a plaintext EB environment variable.
spring:
  config:
    import: "aws-parameterstore:/compendium/api/"
  cloud:
    aws:
      region:
        # Overrides the static fallback in application.yml with the actual EB region.
        # AWS_DEFAULT_REGION is set on EC2 instances by the EB platform.
        static: ${AWS_DEFAULT_REGION:us-east-1}
      parameterstore:
        enabled: true
  flyway:
    url: ${SPRING_DATASOURCE_URL}?useSSL=true&requireSSL=true
    user: ${SPRING_DATASOURCE_USERNAME}
    password: ${db-master-password}  # loaded from SSM: /compendium/api/db-master-password
    # db/aws-migration holds migrations that depend on real RDS features (e.g. the
    # AWSAuthenticationPlugin IAM user). It's a sibling of db/migration, not a
    # subdirectory — Flyway scans locations recursively, so a subdirectory would
    # still be picked up by the default classpath:db/migration location used by
    # tests/CI. Keeping it separate is the only way to make it aws-profile-only.
    locations: classpath:db/migration,classpath:db/aws-migration

db:
  endpoint: ${DB_ENDPOINT}
  iam-username: ${DB_IAM_USERNAME}
  region: ${AWS_DEFAULT_REGION:us-east-1}
